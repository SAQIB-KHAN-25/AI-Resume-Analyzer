services:
  - type: web
    name: ai-resume-analyzer-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DATABASE
        value: ai_resume_analyzer
      - key: MONGODB_REQUIRED
        value: "true"
      - key: JWT_SECRET_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://ai-resume-analyzer-frontend.onrender.com
      - key: TRUSTED_HOSTS
        value: ai-resume-analyzer-backend.onrender.com,localhost,127.0.0.1
  - type: web
    name: ai-resume-analyzer-frontend
    runtime: static
    plan: starter
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_BASE_URL
        value: https://ai-resume-analyzer-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
